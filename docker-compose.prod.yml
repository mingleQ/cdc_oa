services:
  oa:
    build:
      context: .
      dockerfile: Dockerfile
    image: ggcdc-oa:latest
    container_name: ggcdc-oa
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      OA_DB_PATH: /app/data/oa.sqlite
      OA_JWT_SECRET: ${OA_JWT_SECRET}
    volumes:
      - /opt/ggcdc-oa/data:/app/data
      - /opt/ggcdc-oa/uploads:/app/uploads
      - /opt/ggcdc-oa/backups:/app/backups
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
