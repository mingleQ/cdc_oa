# 贵港疾控 OA —— Nginx 反向代理示例（放在腾讯云服务器或 CLB 后端）
# 用法：将本文件放到 /etc/nginx/conf.d/ggcdc-oa.conf，替换域名与证书路径后 reload。

# HTTP 自动跳转 HTTPS（如纯内网无证书，可删掉本段，直接用下方 server 监听 80）
server {
    listen 80;
    server_name oa.ggcdc.local;        # ← 改成实际域名或内网 IP
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name oa.ggcdc.local;        # ← 改成实际域名

    ssl_certificate     /etc/nginx/ssl/ggcdc-oa.crt;   # ← 证书路径
    ssl_certificate_key /etc/nginx/ssl/ggcdc-oa.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 附件最大 50MB，需与后端 OA_UPLOAD_MAX_MB 一致
    client_max_body_size 60m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
