<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OA 协同办公系统 · 使用教程</title>
<style>
  :root { --fg:#1f2933; --muted:#6b7280; --line:#e5e7eb; --accent:#2563eb; --bg:#f7f8fa; --code:#f3f4f6; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    line-height:1.75; font-size:16px; }
  .wrap { max-width:920px; margin:0 auto; padding:32px 24px 80px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:40px 48px;
    box-shadow:0 1px 3px rgba(0,0,0,.04); }
  #content h1 { font-size:28px; border-bottom:2px solid var(--line); padding-bottom:14px; margin-top:0; }
  #content h2 { font-size:22px; margin-top:38px; padding-bottom:6px; border-bottom:1px solid var(--line); }
  #content h3 { font-size:18px; margin-top:26px; color:#111827; }
  #content blockquote { margin:16px 0; padding:10px 16px; background:#eff6ff; border-left:4px solid var(--accent);
    color:#1e40af; border-radius:0 8px 8px 0; }
  #content blockquote p { margin:6px 0; }
  #content table { border-collapse:collapse; width:100%; margin:18px 0; font-size:15px; }
  #content th, #content td { border:1px solid var(--line); padding:9px 12px; text-align:left; }
  #content th { background:#f1f5f9; font-weight:600; }
  #content tr:nth-child(even) td { background:#fafbfc; }
  #content code { background:var(--code); padding:2px 6px; border-radius:5px; font-size:14px;
    font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace; }
  #content pre { background:#0f172a; color:#e2e8f0; padding:16px 18px; border-radius:10px; overflow:auto; }
  #content pre code { background:transparent; color:inherit; padding:0; }
  #content a { color:var(--accent); text-decoration:none; }
  #content a:hover { text-decoration:underline; }
  #content hr { border:none; border-top:1px solid var(--line); margin:32px 0; }
  #content ul, #content ol { padding-left:24px; }
  .loading { color:var(--muted); text-align:center; padding:60px 0; }
  @media (max-width:640px){ .card{padding:24px 18px;} body{font-size:15px;} }
  @media print { body{background:#fff;} .card{border:none;box-shadow:none;padding:0;} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="content"><div class="loading">正在加载文档…</div></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>
    (function () {
      var el = document.getElementById("content");
      fetch(encodeURI("使用教程.md"), { cache: "no-store" })
        .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
        .then(function (md) {
          if (window.marked) {
            marked.setOptions({ gfm: true, breaks: false });
            el.innerHTML = marked.parse(md);
          } else {
            el.innerHTML = "<pre>" + md.replace(/[&<>]/g, function (c) {
              return { "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c];
            }) + "</pre>";
          }
          document.title = (document.querySelector("#content h1") || {}).textContent || document.title;
        })
        .catch(function (e) {
          el.innerHTML = '<div class="loading">文档加载失败：' + e.message +
            '<br/>请直接访问 <a href="使用教程.md">使用教程.md</a></div>';
        });
    })();
  </script>
</body>
</html>
